<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Window frame -->
  <rect width="800" height="500" rx="12" fill="#0F1D36"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="36" rx="12" fill="#1B3A5C"/>
  <rect x="0" y="12" width="800" height="24" fill="#1B3A5C"/>
  <circle cx="20" cy="18" r="5" fill="#EF4444" opacity="0.7"/>
  <circle cx="36" cy="18" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="52" cy="18" r="5" fill="#22C55E" opacity="0.7"/>
  <text x="400" y="22" fill="#9BA3B0" font-size="11" text-anchor="middle" font-weight="600">Document Q&amp;A</text>

  <!-- Chat panel (left 60%) -->
  <rect x="16" y="48" width="460" height="436" rx="8" fill="#1B3A5C"/>

  <!-- User message -->
  <rect x="120" y="64" width="340" height="52" rx="8" fill="#2A3F66"/>
  <text x="132" y="82" fill="#FAF7F2" font-size="10" font-weight="600">You</text>
  <text x="132" y="98" fill="#E8E4DD" font-size="10">What are the steel pile splice requirements for</text>
  <text x="132" y="110" fill="#E8E4DD" font-size="10">Project 04-027P?</text>

  <!-- AI response -->
  <rect x="32" y="130" width="428" height="160" rx="8" fill="#0F1D36"/>
  <rect x="32" y="130" width="3" height="160" rx="1" fill="#C4883A"/>
  <text x="48" y="150" fill="#C4883A" font-size="10" font-weight="700">Atlas</text>
  <rect x="80" y="142" width="44" height="14" rx="7" fill="#2D6A4F"/>
  <text x="102" y="152" fill="#FAF7F2" font-size="8" text-anchor="middle" font-weight="600">AGREE</text>

  <text x="48" y="170" fill="#FAF7F2" font-size="10">Per Section 31 62 16.16, pile splices shall use ASTM</text>
  <text x="48" y="184" fill="#FAF7F2" font-size="10">A572/A572M Grade 50 splice plates. Submit detail</text>
  <text x="48" y="198" fill="#FAF7F2" font-size="10">drawings prior to fabrication. AWS D1.1/D1.1M welding</text>
  <text x="48" y="212" fill="#FAF7F2" font-size="10">required. Maximum two field splices per pile with</text>
  <text x="48" y="226" fill="#FAF7F2" font-size="10">minimum 5 ft section length.</text>

  <!-- Source attribution box -->
  <rect x="48" y="244" width="396" height="32" rx="6" fill="#2A3F66"/>
  <rect x="56" y="252" width="12" height="14" rx="2" fill="#C4883A" opacity="0.6"/>
  <text x="74" y="264" fill="#9BA3B0" font-size="9">Section 31 62 16.16 -- Pile Driving  |  Page 6 of 19  |  Rev. 03/2026</text>

  <!-- Disclaimer -->
  <rect x="32" y="300" width="428" height="28" rx="6" fill="#1B3A5C" opacity="0.5"/>
  <text x="48" y="318" fill="#9BA3B0" font-size="8" font-style="italic">AI-ASSISTED REFERENCE ONLY: Must be reviewed by the engineer of record.</text>

  <!-- Chat input -->
  <rect x="32" y="444" width="428" height="32" rx="8" fill="#2A3F66"/>
  <text x="48" y="464" fill="#9BA3B0" font-size="10">Ask Atlas an engineering question...</text>

  <!-- Sources panel (right 40%) -->
  <rect x="488" y="48" width="296" height="436" rx="8" fill="#1B3A5C"/>
  <text x="504" y="72" fill="#FAF7F2" font-size="12" font-weight="700">Sources</text>
  <rect x="504" y="80" width="264" height="1" fill="#2A3F66"/>

  <!-- Source 1 -->
  <rect x="504" y="92" width="264" height="64" rx="6" fill="#0F1D36"/>
  <text x="516" y="110" fill="#FAF7F2" font-size="10" font-weight="600">31 62 16.16 Pile Driving</text>
  <text x="516" y="124" fill="#9BA3B0" font-size="9">Page 6  |  Spec Section</text>
  <rect x="516" y="134" width="240" height="6" rx="3" fill="#2A3F66"/>
  <rect x="516" y="134" width="226" height="6" rx="3" fill="#22C55E" opacity="0.7"/>
  <text x="744" y="144" fill="#9BA3B0" font-size="8" text-anchor="end">94%</text>

  <!-- Source 2 -->
  <rect x="504" y="168" width="264" height="64" rx="6" fill="#0F1D36"/>
  <text x="516" y="186" fill="#FAF7F2" font-size="10" font-weight="600">05 12 00 Structural Steel</text>
  <text x="516" y="200" fill="#9BA3B0" font-size="9">Page 4  |  Spec Section</text>
  <rect x="516" y="210" width="240" height="6" rx="3" fill="#2A3F66"/>
  <rect x="516" y="210" width="187" height="6" rx="3" fill="#C4883A" opacity="0.7"/>
  <text x="744" y="220" fill="#9BA3B0" font-size="8" text-anchor="end">78%</text>

  <!-- Source 3 -->
  <rect x="504" y="244" width="264" height="64" rx="6" fill="#0F1D36"/>
  <text x="516" y="262" fill="#FAF7F2" font-size="10" font-weight="600">Section I General Provisions</text>
  <text x="516" y="276" fill="#9BA3B0" font-size="9">Page 12  |  Contract</text>
  <rect x="516" y="286" width="240" height="6" rx="3" fill="#2A3F66"/>
  <rect x="516" y="286" width="149" height="6" rx="3" fill="#3B82F6" opacity="0.7"/>
  <text x="744" y="296" fill="#9BA3B0" font-size="8" text-anchor="end">62%</text>
