    <rect x="174" y="134" width="12" height="12" rx="2"/>
    <rect x="274" y="134" width="12" height="12" rx="2"/>
    <rect x="374" y="134" width="12" height="12" rx="2"/>
    <rect x="474" y="134" width="12" height="12" rx="2"/>

