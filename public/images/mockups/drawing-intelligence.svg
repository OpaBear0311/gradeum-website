<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Window frame -->
  <rect width="800" height="500" rx="12" fill="#0F1D36"/>
  <rect x="0" y="0" width="800" height="36" rx="12" fill="#1B3A5C"/>
  <rect x="0" y="12" width="800" height="24" fill="#1B3A5C"/>
  <circle cx="20" cy="18" r="5" fill="#EF4444" opacity="0.7"/>
  <circle cx="36" cy="18" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="52" cy="18" r="5" fill="#22C55E" opacity="0.7"/>
  <text x="400" y="22" fill="#9BA3B0" font-size="11" text-anchor="middle" font-weight="600">Drawing Intelligence</text>

