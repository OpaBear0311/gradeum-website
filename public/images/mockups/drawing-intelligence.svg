  <text x="524" y="72" fill="#9BA3B0" font-size="8" text-anchor="end">REV B  02/15/2024</text>

  <!-- Grid lines -->
  <line x1="80" y1="100" x2="80" y2="440" stroke="#2A3F66" stroke-width="0.5"/>
