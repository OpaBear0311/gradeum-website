  <text x="580" y="118" fill="#FAF7F2" font-size="11" font-weight="600">S-201 -- Pile Layout Plan</text>

  <text x="580" y="144" fill="#9BA3B0" font-size="9">Sheet</text>
  <text x="580" y="158" fill="#FAF7F2" font-size="11">3 of 12</text>

  <text x="580" y="184" fill="#9BA3B0" font-size="9">Zone</text>
  <text x="580" y="198" fill="#FAF7F2" font-size="11">Plan View -- Grid C-4</text>

  <text x="580" y="224" fill="#9BA3B0" font-size="9">Element</text>
  <text x="580" y="238" fill="#FAF7F2" font-size="11" font-weight="600">HP 14x117 Steel H-Pile</text>

  <rect x="580" y="254" width="188" height="1" fill="#2A3F66"/>

  <text x="580" y="278" fill="#9BA3B0" font-size="9">Sealed by</text>
  <text x="580" y="292" fill="#FAF7F2" font-size="11">J. Wiginton, P.E.</text>

  <text x="580" y="318" fill="#9BA3B0" font-size="9">Seal date</text>
  <text x="580" y="332" fill="#FAF7F2" font-size="11">02/15/2024</text>

  <text x="580" y="358" fill="#9BA3B0" font-size="9">Status</text>
  <rect x="580" y="364" width="62" height="20" rx="10" fill="#2D6A4F"/>
  <text x="611" y="378" fill="#FAF7F2" font-size="9" text-anchor="middle" font-weight="700">SEALED</text>
