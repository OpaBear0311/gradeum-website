  <line x1="40" y1="220" x2="530" y2="220" stroke="#2A3F66" stroke-width="0.5"/>
  <line x1="40" y1="300" x2="530" y2="300" stroke="#2A3F66" stroke-width="0.5"/>
  <line x1="40" y1="380" x2="530" y2="380" stroke="#2A3F66" stroke-width="0.5"/>

