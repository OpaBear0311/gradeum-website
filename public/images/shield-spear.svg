<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500" fill="none" stroke="#1B3A5C" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Spear (behind shield, diagonal left) -->
  <line x1="40" y1="30" x2="140" y2="470" />
  <path d="M40,30 L35,55 L40,50 L45,55 Z" fill="#1B3A5C" opacity="0.3" />
  <path d="M35,55 L40,50 L45,55" />
  <line x1="138" y1="462" x2="142" y2="478" stroke-width="2.5" />

  <!-- Spear (behind shield, diagonal right) -->
  <line x1="160" y1="30" x2="60" y2="470" />
  <path d="M160,30 L155,55 L160,50 L165,55 Z" fill="#1B3A5C" opacity="0.3" />
  <path d="M155,55 L160,50 L165,55" />
  <line x1="62" y1="462" x2="58" y2="478" stroke-width="2.5" />

  <!-- Shield (Roman scutum - elongated oval) -->
  <ellipse cx="100" cy="250" rx="55" ry="120" />
  <ellipse cx="100" cy="250" rx="48" ry="110" />

  <!-- Shield boss (center circle) -->
  <circle cx="100" cy="250" r="18" />
  <circle cx="100" cy="250" r="12" />
  <circle cx="100" cy="250" r="5" fill="#1B3A5C" opacity="0.2" />

  <!-- Shield decoration - vertical spine -->
  <line x1="100" y1="135" x2="100" y2="200" />
  <line x1="100" y1="300" x2="100" y2="365" />

  <!-- Shield decoration - horizontal bands -->
  <line x1="55" y1="200" x2="145" y2="200" />
  <line x1="55" y1="300" x2="145" y2="300" />

  <!-- Wing/laurel decorations on shield -->
  <path d="M75,210 Q85,230 100,232" opacity="0.5" />
  <path d="M125,210 Q115,230 100,232" opacity="0.5" />
  <path d="M75,290 Q85,270 100,268" opacity="0.5" />
  <path d="M125,290 Q115,270 100,268" opacity="0.5" />

  <!-- Sketch texture lines -->
  <line x1="80" y1="160" x2="82" y2="165" opacity="0.2" />
  <line x1="115" y1="340" x2="113" y2="345" opacity="0.2" />
  <line x1="90" y1="180" x2="88" y2="184" opacity="0.2" />
</svg>
